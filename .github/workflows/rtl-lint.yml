name: RTL lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  verilator:
    name: Verilator lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Verilator
        run: |
          sudo apt-get update
          sudo apt-get install -y verilator

      - name: Build RTL filelist
        run: |
          grep -v '^uvm/' filelist.f | grep -v '^+incdir+uvm/' > .rtl_filelist.f

      - name: Lint APB I2C wrapper
        run: |
          verilator --language 1800-2017 --lint-only -f .rtl_filelist.f --top-module apb_i2c_wrapper
